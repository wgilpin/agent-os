<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Story Map - agent-os-design.md</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --panel-bg: rgba(255, 255, 255, 0.7);
            --border-color: rgba(15, 23, 42, 0.08);
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --card-bg: #fefce8;
            --card-hover-bg: #fef9c3;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 40px;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(225, 29, 72, 0.04) 0px, transparent 50%);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
        }

        .map-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-icon {
            font-size: 2.5rem;
        }

        .brand h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .subtitle {
            margin: 4px 0 0 0;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .file-path {
            font-family: monospace;
            background: rgba(15, 23, 42, 0.05);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .stats {
            display: flex;
            gap: 12px;
        }}

        .stat-badge {
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .stat-badge strong {
            color: var(--text-primary);
            margin-right: 4px;
        }

        .board {
            display: grid;
            gap: 16px;
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            overflow-x: auto;
        }

        .board-top-left {
            grid-column: 1;
            grid-row: 1 / 3;
            background: rgba(0, 0, 0, 0.01);
            border-radius: 8px;
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .activity-header {
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            border-top: 4px solid #4f46e5;
            border-radius: 12px;
            border-left: 1px solid rgba(0, 0, 0, 0.04);
            border-right: 1px solid rgba(0, 0, 0, 0.04);
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.03);
            text-align: center;
        }

        .activity-name {
            font-weight: 600;
            font-size: 1.05rem;
            color: #0f172a;
        }

        .activity-meta {
            margin-top: 4px;
            display: flex;
            gap: 8px;
            font-size: 0.75rem;
        }

        .activity-slug {
            color: #4f46e5;
            font-weight: 500;
        }

        .step-header {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.02);
        }

        .step-name {
            font-weight: 500;
            font-size: 0.95rem;
            color: #334155;
        }

        .step-meta {
            margin-top: 4px;
            display: flex;
            gap: 6px;
            font-size: 0.7rem;
        }

        .step-slug {
            color: #64748b;
        }

        .empty-step {
            border: 1px dashed rgba(0, 0, 0, 0.08);
            background: transparent;
            box-shadow: none;
        }

        .empty-step .step-name {
            color: rgba(0, 0, 0, 0.25);
            font-style: italic;
        }

        .release-header {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            border-left: 4px solid var(--release-color);
            border-radius: 8px;
            padding: 16px;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            border-right: 1px solid rgba(0, 0, 0, 0.04);
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.02);
        }

        .release-tag {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 2px 8px;
            border-radius: 9999px;
            margin-bottom: 6px;
        }

        .release-name {
            font-size: 1.05rem;
            font-weight: 600;
            color: #0f172a;
        }

        .card-cell {
            border: 1px solid rgba(0, 0, 0, 0.04);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 120px;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.02);
        }

        .empty-cell {
            border: 1px dashed rgba(0, 0, 0, 0.06);
            box-shadow: none;
        }

        .empty-cell-placeholder {
            color: rgba(0, 0, 0, 0.1);
            font-size: 1.5rem;
            font-weight: 300;
            user-select: none;
        }

        .card {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 2px 4px 0 rgba(0, 0, 0, 0.02), 0 1px 2px 0 rgba(0, 0, 0, 0.02);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.08);
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-slug {
            font-family: monospace;
            font-size: 0.7rem;
            background: rgba(0, 0, 0, 0.04);
            padding: 2px 6px;
            border-radius: 4px;
            color: #475569;
        }

        .card-title {
            color: #1e293b;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .no-content {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
            font-size: 1.1rem;
            border: 1px dashed var(--border-color);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.005);
        }

        /* Alternating Release Swimlane Theme Colors */
        .theme-odd {
            background: #fffbeb;
            border-color: rgba(217, 119, 6, 0.08);
        }
        .theme-odd.empty-cell {
            background: rgba(251, 191, 36, 0.02);
            border-color: rgba(217, 119, 6, 0.12);
        }
        .theme-odd .card {
            background: #fef3c7;
            border-color: rgba(217, 119, 6, 0.15);
        }
        .theme-odd .card:hover {
            background: #fde68a;
            border-color: rgba(217, 119, 6, 0.25);
        }
        
        .theme-even {
            background: #f0f9ff;
            border-color: rgba(2, 132, 199, 0.08);
        }
        .theme-even.empty-cell {
            background: rgba(56, 189, 248, 0.02);
            border-color: rgba(2, 132, 199, 0.12);
        }
        .theme-even .card {
            background: #e0f2fe;
            border-color: rgba(2, 132, 199, 0.15);
        }
        .theme-even .card:hover {
            background: #bae6fd;
            border-color: rgba(2, 132, 199, 0.25);
        }
    </style>
</head>
<body>
    <header class="map-header">
        <div class="brand">
            <span class="logo-icon">🗺️</span>
            <div>
                <h1>User Story Map</h1>
                <p class="subtitle">File: <span class="file-path">/Users/will/projects/agent_os/docs/agent-os-design.md</span></p>
            </div>
        </div>
        <div class="stats">
            <div class="stat-badge"><strong>0</strong> Activities</div>
            <div class="stat-badge"><strong>0</strong> Steps</div>
            <div class="stat-badge"><strong>0</strong> Cards</div>
        </div>
    </header>
    <main>
        <div class="no-content">No activities or steps found. Start by adding an activity!</div>
    </main>
</body>
</html>
